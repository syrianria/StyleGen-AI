<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Design Studio</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        primary: "#2C3E50",
        backgroundLight: "#f6f8f6",
        backgroundDark: "#112116"
      }
    }
  }
}
</script>

<style>
body{
  font-family: 'Space Grotesk', sans-serif;
}
</style>
</head>

<body class="bg-backgroundLight dark:bg-backgroundDark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">

<!-- Header -->
<header class="flex justify-between items-center p-6 border-b border-slate-300">
<h1 class="text-xl font-bold text-primary">AI Design Studio</h1>
<button onclick="toggleProfile()">Profile</button>
</header>

<main class="flex-1 p-6 space-y-6">

<!-- Preview -->
<div class="bg-white dark:bg-slate-900 p-6 rounded-xl shadow text-center">

<div id="model"
class="h-64 rounded-lg flex items-center justify-center mb-4 transition-all duration-300 bg-slate-200">
Virtual Model
</div>

<button onclick="swapPattern()" class="w-full border border-primary text-primary py-2 rounded mb-2">
Swap Pattern
</button>

<button onclick="changeFabric()" class="w-full border border-primary text-primary py-2 rounded mb-2">
Change Fabric
</button>

<button onclick="toggleEco()" class="w-full border border-primary text-primary py-2 rounded">
Eco Mode
</button>

</div>

</main>

<!-- Bottom Nav -->
<nav class="flex justify-around p-4 border-t border-slate-300">
<button>Studio</button>
<button>Wardrobe</button>
<button>Eco</button>
<button onclick="toggleProfile()">Profile</button>
</nav>

<!-- Profile Page -->
<div id="profile"
class="hidden fixed inset-0 bg-white dark:bg-slate-900 z-50 p-6 space-y-4">
<h2 class="text-xl font-bold">Profile</h2>

<button class="block w-full text-left">About Us</button>
<button class="block w-full text-left">Customer Support</button>
<button class="block w-full text-left">Sustainability</button>

<button onclick="toggleProfile()"
class="bg-primary text-white px-4 py-2 rounded">
Close
</button>

</div>

<script>

let ecoMode=false;
let pattern=0;
let fabric=0;

function toggleProfile(){
  document.getElementById("profile").classList.toggle("hidden");
}

function swapPattern(){
  pattern++;
  const model=document.getElementById("model");

  if(pattern%2===0){
    model.style.backgroundColor="#e0e0e0";
  }else{
    model.style.backgroundColor="#cfd8dc";
  }
}

function changeFabric(){
  fabric++;
  const model=document.getElementById("model");

  if(fabric%2===0){
    model.style.opacity="1";
  }else{
    model.style.opacity="0.7";
  }
}

function toggleEco(){
  ecoMode=!ecoMode;
  const model=document.getElementById("model");

  if(ecoMode){
    model.style.filter="grayscale(100%)";
  }else{
    model.style.filter="none";
  }
}

</script>

</body>
</html>
